<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 自動化助理 - 首圖極致優化版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* 基礎重置，消除所有預設邊距 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; /* 隱藏捲軸 */
            background-color: transparent; 
            font-family: 'Noto Sans TC', sans-serif; 
        }

        /* --- 核心：完美 16:9 自適應外框 --- */
        .hero-wrapper {
            /* 讓這個區塊永遠保持 16:9 比例，並自動在 iframe 內置中縮放 */
            width: 100vw; 
            height: 56.25vw; 
            max-height: 100vh; 
            max-width: 177.78vh; 
            margin: auto;
            position: absolute;
            top: 0; bottom: 0; left: 0; right: 0;
            
            /* 啟動容器查詢，所有 cqw 單位都會依據這個完美比例的寬度計算 */
            container-type: inline-size;
            background-color: #0B111A;
            overflow: hidden;
            color: #ffffff;
        }

        /* --- 右上角 Logo --- */
        .logo-area {
            position: absolute;
            top: 6cqw;
            right: 5cqw;
            display: flex;
            align-items: flex-start;
            gap: 1cqw;
            z-index: 10;
        }
        .logo-icon { font-size: 2.5cqw; line-height: 0.8; }
        .logo-text { font-size: 1.1cqw; font-weight: 700; line-height: 1.2; letter-spacing: 0.1cqw; }

        /* --- 左側內容區 (改用 Flexbox 避免重疊) --- */
        .content-left {
            position: absolute;
            left: 6cqw;
            top: 0;
            width: 55cqw; /* 限制寬度，避免撞到右側圖片 */
            height: 100%; /* 撐滿高度 */
            display: flex;
            flex-direction: column; /* 讓內容由上往下排 */
            justify-content: center; /* 讓整個內容在垂直方向完美置中 */
            z-index: 2;
        }

        .top-features {
            font-size: 1.1cqw;
            line-height: 1.6;
            color: #d1d1d1;
            letter-spacing: 0.1cqw;
            margin-bottom: 2cqw;
        }

        /* 標題區塊：嚴格限制不換行 */
        .title-line-1 {
            font-size: 4.2cqw;
            font-weight: 900;
            letter-spacing: 0.2cqw;
            white-space: nowrap;
            margin-bottom: 0.5cqw;
        }

        .title-line-2 {
            font-size: 7.2cqw;
            font-weight: 900;
            letter-spacing: 0.4cqw;
            color: transparent;
            -webkit-text-stroke: 0.15cqw #E88349; /* 橘色簍空外框 */
            white-space: nowrap;
            margin-bottom: 1.5cqw;
            line-height: 1.1;
        }

        .sub-title {
            font-size: 1.4cqw;
            font-weight: 500;
            letter-spacing: 0.1cqw;
            color: #e0e0e0;
            white-space: nowrap;
            margin-bottom: 3cqw;
        }

        /* 底部作者資訊 */
        .author-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-left: 20cqw; /* 將區塊往右推，對齊設計圖 */
        }

        .author-name-box {
            display: inline-block;
            border: 1px solid #E88349;
            padding: 0.6cqw 1.2cqw;
            margin-bottom: 1cqw;
        }
        .author-name-box span.name { font-size: 1.4cqw; font-weight: 500; letter-spacing: 0.4cqw; }
        .author-name-box span.eng { color: #a0a0a0; font-size: 1cqw; letter-spacing: 0.1cqw; margin-left: 0.5cqw; }

        .author-desc {
            font-size: 1.1cqw;
            line-height: 1.5;
            color: #d1d1d1;
            font-weight: 500;
            letter-spacing: 0.1cqw;
            white-space: nowrap;
        }

        /* --- 右側人物預留區塊 --- */
        .hero-image-container {
            position: absolute;
            bottom: 0;
            right: 4cqw;
            width: 38cqw;
            height: 90%;
            z-index: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: bottom;
        }

        .image-placeholder {
            width: 100%;
            height: 80%;
            border: 0.2cqw dashed #666;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #888;
            font-size: 1.2cqw;
            text-align: center;
            border-radius: 1cqw;
            margin-bottom: 4cqw;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 2cqw;
        }
    </style>
</head>
<body>

    <div class="hero-wrapper">
        
        <div class="logo-area">
            <div class="logo-icon">❞</div>
            <div class="logo-text">創客永續<br>賦能計畫</div>
        </div>

        <div class="content-left">
            <div class="top-features">
                不再被問問哥問問姐綁架<br>
                用0成本實現的無薪助理<br>
                24H不間斷接單服務
            </div>

            <div class="title-line-1">用AI建立零成本高效</div>
            <div class="title-line-2">自動化助理</div>
            <div class="sub-title">不藏私帶你落地執行客製化做出自己的「自動化系統」</div>

            <div class="author-info">
                <div class="author-name-box">
                    <span class="name">林東岳</span><span class="eng">TROY</span>
                </div>
                <div class="author-desc">
                    用AI實踐時間釋放的無本創業家<br>
                    成功用AI解放時間的實戰高手。
                </div>
            </div>
        </div>

        <div class="hero-image-container">
            <img class="hero-image" src="" alt="林東岳 TROY" style="display: none;" id="my-image">
            <div class="image-placeholder" id="placeholder">
                這裡是預留的人物去背圖位置<br><br>
                (請在原始碼下方<br>將圖片網址貼入 src 中)
            </div>
        </div>

    </div>

    <script>
        const img = document.getElementById('my-image');
        const placeholder = document.getElementById('placeholder');
        if (img.getAttribute('src') && img.getAttribute('src').trim() !== "") {
            img.style.display = "block";
            placeholder.style.display = "none";
        }
    </script>
</body>
</html>
